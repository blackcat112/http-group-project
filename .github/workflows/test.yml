name: Node.js CI

on:
  pull_request:
    branches: [ "main","develop" ]

jobs:
  test:
    runs-on: ubuntu-latest 
    steps:
      - name: Descargar código
        uses: actions/checkout@v4 

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      - name: Ejecutar tests
        run: npm test
